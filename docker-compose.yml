version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: buildingstore_api
    ports:
      - "${8002}:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Data Source=/app/data/store.db
    volumes:
      - sqlite_data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

volumes:
  sqlite_data: 